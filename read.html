intermittent fasting, time-restricted eating, the sixteen-and-eight, one-meal-a-day, the alternate-day fast. Books and clinics and phone apps now sell, as the latest breakthrough in health, the idea of regularly going without food for a stretch."}, {"t": "p", "text": "There is nothing wrong with this. It is good news. But pause, and smile at it."}, {"t": "p", "text": "The sages handed us exactly this, a regular fast of around thirty-six hours, twice a month, thousands of years ago, and they gave it away for free. They built it into the calendar, not the clinic. And they aimed it, first and always, at the soul. The body's repair was simply the gift that came along with it, unbilled."}, {"t": "p", "text": "The modern faster, counting hours on a watch, and the ancient devotee, keeping the eleventh day, are doing very nearly the same thing to their bodies. The only difference is this: one of them is also drawing near to God. The hunger is identical. The destination is not."}]}, {"part": "Part Nine — A Rest Given to the Body", "pnum": 9, "title": "Two languages, one direction", "id": "part-nine-a-rest-given-to-the-body-two-languages-one-direction", "words": 165, "blocks": [{"t": "p", "text": "Stand back now, and look at the whole picture."}, {"t": "p", "text": "The scriptures said that fasting on this day washes away accumulated sin. The laboratory has found that fasting prompts the body to clear out its own accumulated waste, down at the level of the cell."}, {"t": "p", "text": "We will not be so foolish as to claim those are the same thing. Sin is of the soul; cellular debris is of the body, and a book that confuses the two deserves the raised eyebrow it earns. But notice how they point in the very same direction. Two different languages, one of scripture, one of science, describing a single movement: a turning inward, a clearing-out, a renewal. The soul made clean, and the body made clean, by the same simple act, on the same simple day."}, {"t": "p", "text": "That is not proof of anything. It is something quieter and better: a harmony, across thousands of years, between what the saint always knew and what the scientist is only now learning to measure."}]}, {"part": "Part Nine — A Rest Given to the Body", "pnum": 9, "title": "One honest word, before we go on", "id": "part-nine-a-rest-given-to-the-body-one-honest-word-before-we-go-on", "words": 170, "blocks": [{"t": "p", "text": "So that we leave nothing crooked: everything in this chapter about the body is offered as encouragement, never as medicine. The proven part, the body's deep self-cleaning, is real and settled. The hopeful parts, the caps on our DNA, the longer life, are still being worked out, and we will not pretend otherwise. None of it is a guarantee; the body, like the soul, is not a slot machine. And all of it bows to the rule of the ladder: keep the fast by your ability, and never against your health."}, {"t": "p", "text": "We have kept the science honest, and still it leans, with a kind of wonder, toward the very conclusion the sages reached without a single instrument: that this one day is good for you. All of you."}, {"t": "p", "text": "The soul has been fed. The body has been rested. So what, in the end, does one such day actually give to the person who keeps it, in this life, and beyond it? Turn the page, and let us gather the fruits."}]}, {"part": "Part Ten — The Fruits of One Fast", "pnum": 10, "title": "", "id": "part-ten-the-fruits-of-one-fast-lead", "words": 102, "blocks": [{"t": "p", "text": "We have come a long way together."}, {"t": "p", "text": "You know now what this day is, a drawing-near, not a starving. You know who she is, the Lord's own mercy in the shape of a day, fierce and tender at once. You know how to keep her, gently or strictly, and what the keeping quietly does to the body."}, {"t": "p", "text": "One question remains, and it is the one most people ask first: what do I actually get?"}, {"t": "p", "text": "It is a fair question. Let us answer it fully, and let us answer it honestly, which means beginning with a warning, before we ever reach the gifts."}]}, {"part": "Part Ten — The Fruits of One Fast", "pnum": 10, "title": "The reward, set absurdly high", "id": "part-ten-the-fruits-of-one-fast-the-reward-set-absurdly-high", "words": 136, "blocks": [{"t": "p", "text": "First, hear how the Lord Himself priced this single day."}, {"t": "scripture", "text": "The religious merit that one who observes a fast on an Ekadashi day obtains is a hundredfold greater than the fruit of a horse-sacrifice. Those who fast on the Ekadashi day are equal to those in whose very bodies dwell the three great gods, Brahma, Vishnu, and Shiva.", "cite": "Padma Purana, Uttara-khanda, Chapter 38"}, {"t": "p", "text": "Why it is here. in the ancient world, the horse-sacrifice was the most costly, most glorious rite a king could perform, a thing of immense expense and power. And the Lord says one quiet day of fasting outweighs it a hundred times over. He is not being stingy with this day. He has set its reward far beyond all proportion to the small effort it asks."}, {"t": "p", "text": "That is the promise. Now, before you reach for it, the warning."}]}, {"part": "Part Ten — The Fruits of One Fast", "pnum": 10, "title": "It is not a lottery ticket", "id": "part-ten-the-fruits-of-one-fast-it-is-not-a-lottery-ticket", "words": 189, "blocks": [{"t": "p", "text": "Here is the most important sentence in this chapter, and perhaps in the whole book."}, {"t": "p", "text": "Ekadashi is not a vending machine."}, {"t": "p", "text": "You do not put a fast in one end and pull a wish out the other. It is not a coin you spend to buy a new car, a passed exam, or a cured illness on demand. Anyone who keeps the day that way, gripping it like a lottery ticket, watching for the payout, has misunderstood the whole thing, and will most likely be disappointed."}, {"t": "p", "text": "Because the fruits of Ekadashi are not a payment. They are a response. They are what happens between two persons when one of them turns, with love, toward the other. The day is a relationship, not a transaction, and, like every real relationship, it cannot be gamed."}, {"t": "p", "text": "So keep this day for the right reason: to draw near to the One who is the day. Do not keep it to extract a prize. Keep it to be with Him, and then watch, almost as a surprise, all the rest begin to follow."}, {"t": "p", "text": "With that firmly in place, let us see what does follow."}]}, {"part": "Part Ten — The Fruits of One Fast", "pnum": 10, "title": "What it gives in this life", "id": "part-ten-the-fruits-of-one-fast-what-it-gives-in-this-life", "words": 232, "blocks": [{"t": "p", "text": "The first fruits are quiet ones, and you may feel them sooner than you expect."}, {"t": "p", "text": "A stiller mind. On a day when the body is light and the senses are reined in, the endless inner noise drops a little, and something beneath it, a peace you had forgotten, begins to show through."}, {"t": "p", "text": "A strange new freedom. Every time you say not today to the body's demand for food, you learn, in your own bones, a thing the whole world forgets: that you are not your appetites. You are the one who can say no to them. A person who can fast is a person no longer wholly owned by his cravings, and that freedom quietly spreads into every other corner of life."}, {"t": "p", "text": "A lighter load. The scriptures promise, again and again, that this day lifts the weight of past wrongs, that old karma, the long account of our mistakes, is steadily cleared by it. You may never see the ledger. But many who keep the day speak of a lightness, as though something heavy had been quietly set down."}, {"t": "p", "text": "And the old books do not hesitate to promise still more, health, relief from distress, good fortune, a steadiness in life. We hold those exactly as we promised to: as real gifts that tend to come, never as guarantees you may demand. Keep the day for Him; and receive whatever comes as His."}]}, {"part": "Part Ten — The Fruits of One Fast", "pnum": 10, "title": "What it gives beyond this life", "id": "part-ten-the-fruits-of-one-fast-what-it-gives-beyond-this-life", "words": 187, "blocks": [{"t": "p", "text": "But the deepest fruits of one fast are not spent in this life at all. They are saved."}, {"t": "p", "text": "We saw it already, in her story: the one who keeps this day comes under a protection that reaches past the very edge of death. When the final hour arrives, the scriptures say, the messengers of fear cannot approach the faithful keeper of Ekadashi; the Lord's own messengers come instead, and carry the soul gently home."}, {"t": "p", "text": "Think of what that means. The small, light days you keep now, a fortnight apart, barely noticed by anyone, are quietly building something that will meet you at the one moment you cannot avoid. Of all the investments a person can make, this may be the surest, and the cheapest: one day, twice a month, set against the only deadline that is truly certain."}, {"t": "p", "text": "And at the very end of that road stands the greatest fruit the scriptures name, liberation itself. The soul, washed clean across a lifetime of these small turnings, is drawn out at last from the long cycle of birth and death, and carried home to the Lord's own abode."}]}, {"part": "Part Ten — The Fruits of One Fast", "pnum": 10, "title": "The fruit that is the whole tree", "id": "part-ten-the-fruits-of-one-fast-the-fruit-that-is-the-whole-tree", "words": 216, "blocks": [{"t": "p", "text": "And now the truth that gathers up all the rest."}, {"t": "p", "text": "For all this talk of fruits, peace and freedom and lightness, protection and liberation, the real gift of Ekadashi was never any of these things. They are the leaves. Here is the tree."}, {"t": "p", "text": "The true fruit of the day is the Lord Himself."}, {"t": "p", "text": "Remember who she is. Ekadashi is not a clerk handing out rewards from a window; she is the Lord's own mercy, come in the form of a day for the single purpose of drawing you to Him. So the final gift of keeping her is not a better life, nor even a better death. It is nearness to God, the very thing the cry on the first page of this book was always reaching for."}, {"t": "p", "text": "Everything else, the peace, the health, the lighter karma, the open gates at death, is only the overflow. What she truly gives is not a thing at all. She gives the Giver."}, {"t": "p", "text": "That is the fruit of one fast."}, {"t": "p", "text": "So who, then, is allowed to reach for it? Surely a gift this great must be reserved for the strong, the pure, the already-holy? Turn the page, and meet the strongest man who ever lived, brought to his knees by a single day, and the mercy that caught him."}]}, {"part": "Part Eleven — One Day for the Whole Year", "pnum": 11, "title": "", "id": "part-eleven-one-day-for-the-whole-year-lead", "words": 57, "blocks": [{"t": "p", "text": "We ended the last chapter with a question. A gift this great, surely it must be reserved for the strong, the disciplined, the already-holy?"}, {"t": "p", "text": "The scriptures answer that question with a story. And they choose, of all people, the strongest man who ever lived, to show you that strength was never the point."}, {"t": "p", "text": "His name was Bhima."}]}, {"part": "Part Eleven — One Day for the Whole Year", "pnum": 11, "title": "The mighty man who could not fast", "id": "part-eleven-one-day-for-the-whole-year-the-mighty-man-who-could-not-fast", "words": 238, "blocks": [{"t": "p", "text": "Bhima was a Pandava, one of the five royal brothers of the Mahabharata, and a giant among them. He had, it is said, the strength of ten thousand elephants. He bent iron, broke armies, and carried his brothers on his back. There was no enemy on earth he feared."}, {"t": "p", "text": "But there was one thing the mightiest man alive could not do."}, {"t": "p", "text": "He could not go hungry."}, {"t": "p", "text": "Within Bhima, the scriptures say, there burned a fire of hunger so fierce that it had its own name, Vrika, the wolf, and it gave him his title, Vrikodara, wolf-belly. That fire would not be denied. To skip a single meal was, for Bhima, an agony the rest of us can scarcely imagine."}, {"t": "p", "text": "And this was his private grief. For all around him, his family were devoted keepers of Ekadashi. His mother Kunti, his saintly brother Yudhishthira, his wife Draupadi, Arjuna, the twins, every one of them fasted faithfully on the eleventh day, twice a month, and gently urged him to join them."}, {"t": "p", "text": "He could not. The one thing his holy family did with ease, the great Bhima, who could do anything, simply could not do. Twenty-four days a year, he sat with his appetite while those he loved drew near to God without him."}, {"t": "p", "text": "Have you ever felt that? That everyone else seems able to do the good thing, and you, for all your wanting, cannot? Then Bhima is your brother."}]}, {"part": "Part Eleven — One Day for the Whole Year", "pnum": 11, "title": "The question you have been wanting to ask", "id": "part-eleven-one-day-for-the-whole-year-the-question-you-have-been-wanting-to-ask", "words": 159, "blocks": [{"t": "p", "text": "At last, in his distress, Bhima went to the wisest man he knew, his own grandfather, the sage Vyasa, who had compiled the scriptures themselves."}, {"t": "p", "text": "And he asked him the most honest question in this whole book. It is, very likely, the question you have been holding too."}, {"t": "p", "text": "Grandfather, he said, everyone I love keeps every Ekadashi, and I cannot keep even one. The hunger in me will not allow it. So tell me, is there one fast? Just one, in all the year, that a man like me could manage, and that would give me the merit of all the rest?"}, {"t": "p", "text": "Read that again, for it is a daring thing to ask. He is not asking for an easy way out. He is asking whether mercy is large enough to meet a man at his very weakest point, whether the door can be made wide enough even for him."}, {"t": "p", "text": "And the answer is the heart of this chapter."}]}, {"part": "Part Eleven — One Day for the Whole Year", "pnum": 11, "title": "The one day that holds the year", "id": "part-eleven-one-day-for-the-whole-year-the-one-day-that-holds-the-year", "words": 177, "blocks": [{"t": "p", "text": "Vyasa smiled, and said yes."}, {"t": "p", "text": "There is one such day, he told Bhima. It falls once a year, in the heat of early summer. On that day you will keep a single, complete fast, no food, and this time not even water, from one sunrise to the next."}, {"t": "p", "text": "Keep that one day fully, Vyasa promised, and you will receive the merit of all the Ekadashis of the entire year. A whole year's devotion, folded into a single day."}, {"t": "p", "text": "That day is called Nirjala, the waterless, and to this day it is also called Bhima Ekadashi, and the Pandava Ekadashi, after the giant for whom it was given. The Brahma-vaivarta Purana preserves the whole exchange."}, {"t": "p", "text": "Look at what the Lord's mercy has just done. It has bent all the way down to meet the one person who could do the least. It did not say to Bhima, be stronger. It said, here, one day, and I will count it as all of them. That is not the logic of a stern accountant. That is the logic of love."}]}, {"part": "Part Eleven — One Day for the Whole Year", "pnum": 11, "title": "He fell — and he did not let go", "id": "part-eleven-one-day-for-the-whole-year-he-fell-and-he-did-not-let-go", "words": 97, "blocks": [{"t": "p", "text": "And Bhima kept it."}, {"t": "p", "text": "The mighty man, who could uproot trees, was brought to his knees by a single day without water. The scriptures say that by the end of it he trembled, and swayed, and fainted, and fell."}, {"t": "p", "text": "But he did not break the vow. He held on, through the faint, to the next sunrise, and he completed it. The strongest man alive, undone and yet unbroken by one small day given to God."}, {"t": "p", "text": "It is a stirring picture. But here we must stop, and say something very plainly, because the story is so easily misread."}]}, {"part": "Part Eleven — One Day for the Whole Year", "pnum": 11, "title": "Read this carefully: the faint is the warning", "id": "part-eleven-one-day-for-the-whole-year-read-this-carefully-the-faint-is-the-warning", "words": 177, "blocks": [{"t": "p", "text": "Bhima's fainting is not the goal of this story. It is the warning inside it."}, {"t": "p", "text": "Nirjala falls in the fiercest heat of the year, and a full day with no water, in that heat, is genuinely dangerous for many people. Bhima was a superhuman warrior, and even he collapsed. You are not being asked to."}, {"t": "p", "text": "So hear this clearly. If you are a child or elderly; if you are pregnant or nursing; if you are diabetic, or on medication for the heart, the kidneys, or blood pressure; if you are unwell, or labouring in the sun, the waterless fast is not for you, and there is no failure whatsoever in that. Keep your water. Take fruit. Keep the day gently, on a lower level of the ladder. That gentle day pleases the Lord every bit as much as Bhima's did."}, {"t": "p", "text": "Bhima's story was never meant to push the weak past their limit. It was meant to comfort them. Do not collapse to prove a point. The faint is the danger to avoid, not a badge to earn."}]}, {"part": "Part Eleven — One Day for the Whole Year", "pnum": 11, "title": "Why this story is really for you", "id": "part-eleven-one-day-for-the-whole-year-why-this-story-is-really-for-you", "words": 175, "blocks": [{"t": "p", "text": "Now feel what this story was truly given for."}, {"t": "p", "text": "If, somewhere in these pages, a quiet voice in you has been saying, this is beautiful, but I am not the fasting type, I could never do it, then understand that the scriptures saw you coming. At the very centre of this practice they placed not a tale of an effortless saint, but the tale of a man who could barely fast at all, and who was met by mercy anyway."}, {"t": "p", "text": "You do not have to be strong. Bhima wasn't, in this one thing, and Bhima is the hero of the story. You only have to be willing, to find your level, and to begin."}, {"t": "p", "text": "The mercy of this day was built, from the very beginning, to reach the one who is sure she cannot. Which means it was built for very nearly everyone."}, {"t": "p", "text": "And if it was built even for the strongest man, who could not fast, then for whom else? Is anyone, anywhere, truly shut out? Turn the page. The answer may surprise you."}]}, {"part": "Part Twelve — No One Is Turned Away", "pnum": 12, "title": "", "id": "part-twelve-no-one-is-turned-away-lead", "words": 95, "blocks": [{"t": "p", "text": "We have just watched the strongest man who ever lived be let in, the one who could barely fast at all. So now ask the question plainly:"}, {"t": "p", "text": "Is there anyone the door is closed to?"}, {"t": "p", "text": "This chapter has a single task: to show you that there is not. Not the weak, not the fallen, not the stranger to this faith. The day was built, from the very start, to leave no one standing outside."}, {"t": "p", "text": "Let us begin with how far one soul will go for this gift, and then see how far down it reaches."}]}, {"part": "Part Twelve — No One Is Turned Away", "pnum": 12, "title": "The vow worth more than a kingdom", "id": "part-twelve-no-one-is-turned-away-the-vow-worth-more-than-a-kingdom", "words": 402, "blocks": [{"t": "p", "text": "There was once a king named Rukmangada, a great lover of God, who held Ekadashi so dear that he made it the law of his whole realm: everyone who was able would keep the day. And under his rule the people grew so pure that something strange began to happen, the lord of death found his dark regions emptying out, for the souls who kept Ekadashi were no longer falling into them."}, {"t": "p", "text": "So, to test the king, a celestial enchantress named Mohini was sent to him, beautiful beyond resisting. Bewitched, the king promised her, before she would be his, that he would grant her any wish she named."}, {"t": "p", "text": "For years all was well, and still he never missed his fast. Then, on one Ekadashi, she sprang the trap. Keep me, or keep your vow, she said, but you shall not do both. Break your fast today, or lose me forever."}, {"t": "p", "text": "The king did not waver the way she had expected. He offered her his treasury, his kingdom, his very life, anything at all, but the fast, he said, he simply could not break."}, {"t": "p", "text": "So she asked for the one thing she was certain no father could give: the life of his own beloved son."}, {"t": "p", "text": "It is a terrible moment, and the scriptures do not pretend otherwise. The king was torn to the depths of his soul. And yet, such was the family he had raised, his son and his queen, as devoted as he, would not let him break his word to God; they begged him to keep his vow, whatever it cost them."}, {"t": "p", "text": "But the test was never allowed to finish. At the very brink, before any harm could be done, the Lord Himself intervened. He had seen a faith that would surrender everything, wealth, throne, even a child, rather than break trust with His day. And He gathered the whole family up, the king, the queen, the son, and carried them home to His own eternal abode. (The Narada Purana keeps this account.)"}, {"t": "p", "text": "You and I will never be tested like that, and we are not meant to be. The story is not a command; it is a measuring-rod. It shows you, at the furthest extreme, how precious this one day is, and how completely the Lord stands behind the soul who treasures it."}, {"t": "p", "text": "That is how high the vow can rise. Now see how low its mercy can reach."}]}, {"part": "Part Twelve — No One Is Turned Away", "pnum": 12, "title": "The door for the fallen", "id": "part-twelve-no-one-is-turned-away-the-door-for-the-fallen", "words": 234, "blocks": [{"t": "p", "text": "If this practice worked only for saintly kings, it would be a beautiful thing, and a useless one, for most of us are not saintly kings. We come with mixed hearts and crowded pasts."}, {"t": "p", "text": "Here is the mercy of it. The old books are full of the unlikely being lifted by this day, not only the pure, but the careless, the worldly, the once-cruel, the deeply fallen. The day does not check your record at the door."}, {"t": "p", "text": "We saw it already, in the very first telling of her story: when Ekadashi began her work, it was the suffering and the sinful she freed first, the ones already fallen into the regions of punishment. That is who she was made for."}, {"t": "p", "text": "And recall the astonishing leniency we met early on, that even a fast kept imperfectly, clumsily, partly, even half by accident, still washes sin away; that even hearing the glories of this day begins to cleanse the one who hears. A practice that counts even your stumbling attempts is a practice that has decided, in advance, not to lose you."}, {"t": "p", "text": "So if some quiet voice has whispered that your past is too dark, your habits too deep, your faith too thin, let the scriptures answer it to your face. This gift was built precisely for the one who fears he is too far gone. There is no one too low for the eleventh day."}]}, {"part": "Part Twelve — No One Is Turned Away", "pnum": 12, "title": "Keep your own God", "id": "part-twelve-no-one-is-turned-away-keep-your-own-god", "words": 196, "blocks": [{"t": "p", "text": "And now the last wall to come down, the highest one of all."}, {"t": "p", "text": "Perhaps you have read this whole book warmly, and yet from a certain distance, thinking: but this is a Hindu practice, and I am not of it. So the door, surely, is not truly mine."}, {"t": "p", "text": "It is. Fully."}, {"t": "p", "text": "What this day actually asks of you belongs to no single religion: lighten the body for one day, and lift the heart to God. That is not the property of any one people. It is a principle as open as the air, and it works for anyone willing to live it."}, {"t": "p", "text": "You are not asked to convert, nor to abandon the God you already love, nor to call Him by a name that is strange to you. Keep your own faith. Keep your own God. On the eleventh day, simply give Him one day, fast as you are able, and turn the freed hours toward Him, in your own words and your own way. The practice will be every bit as real, and every bit as dear to Him."}, {"t": "p", "text": "A door that turns no faith away is a door with no one left outside it."}]}, {"part": "Part Twelve — No One Is Turned Away", "pnum": 12, "title": "So — no one", "id": "part-twelve-no-one-is-turned-away-so-no-one", "words": 183, "blocks": [{"t": "p", "text": "Gather them up now, all the ones we have met."}, {"t": "p", "text": "Bhima, who was too weak to fast, let in. Ambarisha, who kept it faithfully, guarded by God's own hand. Rukmangada, who would give up everything rather than break it, carried home. The fallen and the careless, lifted by their stumbling attempts. And you, of whatever faith, or none, who has read this far: invited, by name."}, {"t": "p", "text": "There is, in the end, only one way to be shut out of this gift. And it is not by being too weak, too sinful, too busy, or too foreign."}, {"t": "p", "text": "It is by never trying."}, {"t": "p", "text": "That door, and that door alone, you hold the key to yourself. No one else can close it on you, and no one else can open it for you."}, {"t": "p", "text": "So let us make sure it never stays closed. You know now what the day is, who she is, why she comes, how to keep her, and that she is truly meant for you. One thing remains: to actually begin. Turn the page, and let us walk, together, through your very first Ekadashi."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "", "id": "part-thirteen-how-to-begin-this-fortnight-lead", "words": 106, "blocks": [{"t": "p", "text": "You now know more about Ekadashi than most people who have kept it all their lives."}, {"t": "p", "text": "You know what it is, and who she is. You know why the day falls where it does, and why the grain is set aside. You know the levels, the fruits, the stories, and that the door stands open for you."}, {"t": "p", "text": "But knowing is not keeping. A map studied at the table has carried no one a single step."}, {"t": "p", "text": "So let us close the book of theory and open the door of practice. Not someday. This fortnight. Here, in five simple steps, is how to keep your very first Ekadashi."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "One — Find the next day", "id": "part-thirteen-how-to-begin-this-fortnight-one-find-the-next-day", "words": 153, "blocks": [{"t": "p", "text": "You are never more than about two weeks from an Ekadashi. There is almost certainly one coming within days."}, {"t": "p", "text": "So find it. A glance at a Hindu calendar or panchang will tell you. And we have built a small companion app for exactly this, it keeps every Ekadashi date, shows you the morning and the time to break the fast, and quietly reminds you, so the day never slips past unnoticed. (You will find the same gentle reminders by subscribing to our channel, Ekadashi Fasting.) However you choose to do it, note just two things: the date of the fast, and the morning after it."}, {"t": "p", "text": "And do not wait for a grand, perfect beginning, a new year, a birthday, the day you finally have your life in order. That day never comes. The next Ekadashi is the perfect one, precisely because it is the next one. Circle it. It is now an appointment."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "Two — Choose your level", "id": "part-thirteen-how-to-begin-this-fortnight-two-choose-your-level", "words": 147, "blocks": [{"t": "p", "text": "Return, in your mind, to the ladder."}, {"t": "p", "text": "Look honestly at your body and your life, and pick the level you can truly stand on. If you are new, and most readers keeping a first fast are, begin at the bottom, and begin there without a shred of shame: the non-grain day. Through the day you eat much as you normally would, simply leaving out all grains and beans. Nothing more is required to keep a true Ekadashi."}, {"t": "p", "text": "And keep the old safeguard in view: if you are unwell, elderly, pregnant, a child, or under any medical care that fasting could affect, stay gentle, keep your water and fruit, and never strain. The lowest level kept in love outshines the highest level kept in harm."}, {"t": "p", "text": "Decide your level now, before the day arrives. A choice made in advance is one the hungry afternoon cannot talk you out of."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "Three — Set the night before", "id": "part-thirteen-how-to-begin-this-fortnight-three-set-the-night-before", "words": 92, "blocks": [{"t": "p", "text": "The fast does not begin at dawn. It begins the evening before."}, {"t": "p", "text": "On that night, Dashami, eat your last meal light, simple, and grain-free, and finish it before you sleep. You will then wake to the fast already begun, your body clean and ready, instead of heavy from a late, large dinner."}, {"t": "p", "text": "And before you sleep, do three small things. Settle, finally, on your level. Set a reminder, if you are forgetful. And whisper, to whatever God you love, that tomorrow is His."}, {"t": "p", "text": "That is all the preparation a first fast needs."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "Four — Keep the day", "id": "part-thirteen-how-to-begin-this-fortnight-four-keep-the-day", "words": 181, "blocks": [{"t": "p", "text": "Now the day itself, and here is the secret you must not forget."}, {"t": "p", "text": "Keeping Ekadashi is two things at once, never only one. With one hand you hold your level: you leave the grains, or take only fruit, or only water, according to what you chose. With the other hand, the more important one, you fill the freed hours with God."}, {"t": "p", "text": "So as the day moves on, return to Him, again and again, in any of the small ways we have named. Say His holy name under your breath. Read a page of something sacred. Think of Him in the quiet that the skipped meals leave behind. Do a small service in His name. And if Hare Krishna is not yours, use the name your own heart trusts, He is listening either way."}, {"t": "p", "text": "Do not grit your teeth and merely endure the hunger. Court the nearness instead, and let the hunger sink into the background. This is not a day of punishment. It is a date with the One you have been reaching for all your life. Keep it like one."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "Five — Break it well, the next morning", "id": "part-thirteen-how-to-begin-this-fortnight-five-break-it-well-the-next-morning", "words": 104, "blocks": [{"t": "p", "text": "The fast is to be completed, not abandoned. So finish it with the same care you began it."}, {"t": "p", "text": "On the next morning, Dvadashi, break the fast within its proper window, neither rushing it before dawn nor letting the morning slip away. Break it simply: if you fasted on water, take a little fruit first; if on fruit, return gently to grains. A quiet word of thanks to the Lord, and the day is sealed."}, {"t": "p", "text": "And then, notice how you feel. Lighter, very often, than a skipped meal has any right to make you. That lightness is the first small fruit, and it is real."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "Then, do it again", "id": "part-thirteen-how-to-begin-this-fortnight-then-do-it-again", "words": 101, "blocks": [{"t": "p", "text": "That is one Ekadashi, kept whole. You have done the very thing this entire book was written to bring you to."}, {"t": "p", "text": "Now the only instruction that remains is the easiest, and the hardest: do it again. In a fortnight, the next one comes. Keep that one too. And the one after."}, {"t": "p", "text": "Do not aim, today, at a flawless lifetime of fasts, that thought has crushed more good beginnings than any failure ever did. Aim only at the next one. A practice is not built by a heroic year; it is built by the next honest day, laid quietly upon the last."}]}, {"part": "Part Thirteen — How to Begin, This Fortnight", "pnum": 13, "title": "Begin imperfectly", "id": "part-thirteen-how-to-begin-this-fortnight-begin-imperfectly", "words": 169, "blocks": [{"t": "p", "text": "One last permission, and perhaps the most freeing in the whole book."}, {"t": "p", "text": "You will not do this perfectly. You will forget a date. You will keep a day half-heartedly, or break one you meant to hold. You will climb the ladder, slip back a level, and climb again."}, {"t": "p", "text": "Keep going anyway."}, {"t": "p", "text": "Remember the mercy we kept meeting, that even a fast kept clumsily, partially, imperfectly, still counts; that she does not lose the one who stumbles toward her. The only fast that truly fails is the one never attempted. The best one you will ever keep is simply the next one."}, {"t": "p", "text": "So begin. Imperfectly, gently, this very fortnight, but begin."}, {"t": "p", "text": "You have learned what one fast can do. There is only one thing left to ask: when you have kept this day, and kept it again, and let it work quietly upon you over the months and years, where, in the end, does it take you? Turn the page, and let us come, at last, back to the One."}]}, {"part": "Part Fourteen — Coming Back to the One Day", "pnum": 14, "title": "", "id": "part-fourteen-coming-back-to-the-one-day-lead", "words": 33, "blocks": [{"t": "p", "text": "We began, many pages ago, with a quiet wish, the one almost everyone carries, and rarely says aloud. I wish I could start over."}, {"t": "p", "text": "Look how far that small wish has carried us."}]}, {"part": "Part Fourteen — Coming Back to the One Day", "pnum": 14, "title": "The whole journey, in one breath", "id": "part-fourteen-coming-back-to-the-one-day-the-whole-journey-in-one-breath", "words": 296, "blocks": [{"t": "p", "text": "We found that the fresh start we longed for was not a someday, but a day, the eleventh of the moon, returning faithfully twice a month, free."}, {"t": "p", "text": "We learned its true name: upavasa, to dwell near. Not a going-without, but a drawing-close."}, {"t": "p", "text": "We saw that the scriptures place this one light day above every other fast, the king of vows, the mother of them all, so that to keep it is to hold, in a single day, what a thousand other practices reach for."}, {"t": "p", "text": "We met her, Ekadashi herself, not a square on a calendar, but a person: a form of the Lord's own mercy, born from His body, merciful enough to empty a hell and strong enough to slay a demon; a power that fights for you and shelters you, even past death."}, {"t": "p", "text": "We learned why the day falls where it does, and why the grain is set aside. We climbed the gentle ladder of levels, each of us finding the one we could honestly stand on. We learned to fill the freed hours with His name, and to let the body, in its rest, quietly heal itself, the soul fed and the body cleansed by one and the same act."}, {"t": "p", "text": "We heard the stories, the strongest man who could not fast, and was let in; the king the Lord's own hand protected; the king who held the vow above his crown. And we saw that the door has no one outside it: not the weak, not the fallen, not the soul of any other faith."}, {"t": "p", "text": "And then we learned, simply, to begin."}, {"t": "p", "text": "It has been a long road. But notice, all of it, every page, folds back into one small thing you can do this very fortnight. One day. That is the whole book."}]}, {"part": "Part Fourteen — Coming Back to the One Day", "pnum": 14, "title": "The great reversal", "id": "part-fourteen-coming-back-to-the-one-day-the-great-reversal", "words": 186, "blocks": [{"t": "p", "text": "Now, at the summit, let me show you the most astonishing thing of all, the secret hidden at the centre of this, and of every true path to God."}, {"t": "p", "text": "You give Him one day. And He gives you Himself."}, {"t": "p", "text": "Sit with how lopsided that trade is. You set aside a few meals. You turn your heart toward Him for a single turning of the sun. And in exchange, the Lord of everything, who needs nothing, who owns the worlds, leans down, accepts your small offering as though it were precious, and begins to give you the one thing the human heart has ever truly wanted: Himself. His nearness. The end of the long ache of separation."}, {"t": "p", "text": "This is the open secret of His nature. He cannot be bought with wealth, or won by force, or earned by cleverness. But He is helplessly moved by love, even a little of it, offered in even a small thing. A leaf. A sound. A day."}, {"t": "p", "text": "He is, in the end, so easily reached. We were the ones who made it complicated. He made it a single day, and waited."}]}, {"part": "Part Fourteen — Coming Back to the One Day", "pnum": 14, "title": "What more could you want?", "id": "part-fourteen-coming-back-to-the-one-day-what-more-could-you-want", "words": 128, "blocks": [{"t": "p", "text": "So pause here, and ask yourself honestly: what more were you looking for?"}, {"t": "p", "text": "You wanted peace; this quiets the heart. You wanted to be clean; this washes the past. You wanted to be well; this rests and renews the body. You wanted to be held by something that will not leave; this opens a real, two-way line to the One who never does."}, {"t": "p", "text": "It was all here the whole time, in the most ordinary-looking thing imaginable, a day you simply give back to God."}, {"t": "p", "text": "You do not need to go searching any further. You do not need a better, rarer, harder practice. The highest one was placed in your hands on the very first page, and it returns to you every fortnight, for the rest of your life."}]}, {"part": "Part Fourteen — Coming Back to the One Day", "pnum": 14, "title": "Come back, and back, and back", "id": "part-fourteen-coming-back-to-the-one-day-come-back-and-back-and-back", "words": 219, "blocks": [{"t": "p", "text": "There is only this left to say."}, {"t": "p", "text": "Life will scatter you. It scatters everyone. There will be seasons when you forget the day, when the world is too loud, when the old hungers win and the heart goes cold and far away."}, {"t": "p", "text": "When that happens, and it will, do not despair, and do not stay away."}, {"t": "p", "text": "Just come back to the one day."}, {"t": "p", "text": "It is always there, never more than a fortnight off, holding the door exactly where you left it. You do not have to earn your way back in. You have only to keep the next one. The eleventh day asks nothing about your past, only your presence, again, today."}, {"t": "p", "text": "One fast can change your life. That was the promise on the cover, and it is true. But here is the fuller truth, now that you have walked the whole way: a life of these single days, each one small, strung quietly together across the years like beads upon a thread, is a life walked all the way home."}, {"t": "p", "text": "So keep coming back to the One. One day at a time."}, {"t": "p", "text": "There is one last voice you have not yet heard clearly in these pages, the voice of the one who wrote them. Turn the page, and let me, at last, say a word to you myself."}]}, {"part": "Part Fifteen — A Word from the Author", "pnum": 15, "title": "", "id": "part-fifteen-a-word-from-the-author-lead", "words": 68, "blocks": [{"t": "p", "text": "Through this whole book, I have mostly hidden behind the word we, and on the few occasions I said I, I kept myself small and out of the way, so that nothing would stand between you and the gift."}, {"t": "p", "text": "Now, at the very end, let me step out from behind the page, just for a moment, and speak to you plainly. As myself. As one person to another."}]}, {"part": "Part Fifteen — A Word from the Author", "pnum": 15, "title": "A friend, not a teacher", "id": "part-fifteen-a-word-from-the-author-a-friend-not-a-teacher", "words": 143, "blocks": [{"t": "p", "text": "First, let me tell you what I am not."}, {"t": "p", "text": "I am not a guru. I am not a holy man, not a saint, not anyone's spiritual authority. I have no seat to sit on, and no right to instruct you."}, {"t": "p", "text": "I am only a friend who stumbled onto something quietly enormous, and could not, in good conscience, keep it to himself."}, {"t": "p", "text": "Everything in these pages that is true and good is not mine. I borrowed it, every word of it, from the scriptures, from the saints, from the patient teachers who carried this gift down through the centuries so that it could reach an ordinary person like me, and then like you. I only gathered it up and tried to hand it to you in plain words. Whatever is wise here belongs to them. Whatever is clumsy or mistaken belongs to me alone."}]}, {"part": "Part Fifteen — A Word from the Author", "pnum": 15, "title": "Why my name is not on this book", "id": "part-fifteen-a-word-from-the-author-why-my-name-is-not-on-this-book", "words": 179, "blocks": [{"t": "p", "text": "You may have noticed something. Nowhere in these pages have I told you who I am. There is a small pen-name at the end, and nothing more. You might wonder why."}, {"t": "p", "text": "It is for a simple reason. This gift is not mine to sign."}, {"t": "p", "text": "I did not invent the eleventh day. I did not discover what it does, nor earn the right to give it away. I am only a courier, who was handed something precious and asked to deliver it. And it would be a strange and vain thing for a courier to print his own name large across a treasure that was never his to begin with."}, {"t": "p", "text": "So weigh the fast, not the hand that passed it to you. If something in this book helps you, and I pray it does, do not give the thanks to me. Give it to the Lord, and to Ekadashi, and to the saints who kept this alive. And if something here fails you, blame my poor telling, never the gift itself. The jewel is flawless. Only the wrapping was mine."}]}, {"part": "Part Fifteen — A Word from the Author", "pnum": 15, "title": "A small confession", "id": "part-fifteen-a-word-from-the-author-a-small-confession", "words": 189, "blocks": [{"t": "p", "text": "Let me be honest with you, the way a friend should."}, {"t": "p", "text": "I did not come to this as a believer. I came late, and I came doubting, the kind of person who would once have rolled his eyes at a book like this one. For a long time I was certain that fasting was either a diet or a superstition, and that a sacred day was nothing but a square on someone else's calendar."}, {"t": "p", "text": "I was wrong, and it took me far too long to find out. So I write to you not from the summit, but from somewhere partway up the path, still a beginner, still climbing the levels slowly, still, to my shame, forgetting days I had meant to keep. I am not ahead of you. I am right beside you, learning as I go."}, {"t": "p", "text": "If anything, that is exactly why I dared to write. You do not need a saint to tell you about this. You need someone who resisted it, and was won over anyway, so that when the doubting voice in you speaks up, you will know it has already been answered, in me."}]}, {"part": "Part Fifteen — A Word from the Author", "pnum": 15, "title": "Why I wrote it anyway", "id": "part-fifteen-a-word-from-the-author-why-i-wrote-it-anyway", "words": 129, "blocks": [{"t": "p", "text": "I wrote because one day genuinely changed something in me, and because it grieved me that so many people will live their whole lives and never once be told that such a day exists."}, {"t": "p", "text": "Or worse, that they will hear of it only wrapped in fear, and rules, and a long list of things they are doing wrong. That is not how it was given to me, and it is not how I wanted to give it to you. I wanted to hand it over the way it truly is: as mercy. As an invitation. As one of the kindest, easiest, most generous gifts ever placed within human reach."}, {"t": "p", "text": "One day. That is all it asks. I could not keep quiet about something so small that gives so much."}]}, {"part": "Part Fifteen — A Word from the Author", "pnum": 15, "title": "Now it is yours", "id": "part-fifteen-a-word-from-the-author-now-it-is-yours", "words": 107, "blocks": [{"t": "p", "text": "So here it is, fully in your hands."}, {"t": "p", "text": "Keep the day, gently, imperfectly, at whatever level you can. Let it do its quiet work on you, over the fortnights and the years. And when, one day, you find that it has changed something in you too, do the one thing that keeps a gift like this alive."}, {"t": "p", "text": "Pass it on. Tell someone else. Lend them this little book, or simply tell them, in your own words, about the one day that can change a life. That is how this reached you, across all those centuries, one friend quietly telling another. Be the next link in that chain."}]}, {"part": "Part Fifteen — A Word from the Author", "pnum": 15, "title": "With gratitude", "id": "part-fifteen-a-word-from-the-author-with-gratitude", "words": 121, "blocks": [{"t": "p", "text": "I bow to the Lord, who made the way home so impossibly easy."}, {"t": "p", "text": "I bow to Ekadashi, His own mercy in the form of a day, who asks so little of us, and gives so much."}, {"t": "p", "text": "I bow to the teachers and the saints who carried this gift faithfully across the ages, and into my undeserving hands."}, {"t": "p", "text": "And I bow to you, the reader, of whatever faith, or none, who gave these pages your time, and your trust. May the one day bless you, and rest you, and carry you, at last, all the way home."}, {"t": "p", "text": "Your friend and servant,"}, {"t": "p", "text": "Dina Bandhu Bhakta Charan Sevak"}, {"t": "p", "text": "a servant at the feet of the devotees, and a friend to anyone who is searching."}]}];

/* ---------- group the flat section list into chapters (one per Part) ---------- */
var CH = (function(){
  var map={}, order=[];
  BOOK.forEach(function(s){
    if(!map[s.part]){ map[s.part]={part:s.part, pnum:s.pnum, id:'ch'+s.pnum, sections:[]}; order.push(s.part); }
    map[s.part].sections.push(s);
  });
  var arr=order.map(function(k){ return map[k]; });
  arr.forEach(function(c){ c.words=c.sections.reduce(function(a,s){ return a+s.words; },0); });
  return arr;
})();

var synth = window.speechSynthesis;
var SENT = [], idx = 0, curCh = 0, speaking = false, paused = false, gen = 0;
var voices = [], curVoice = null;

var $ = function(id){ return document.getElementById(id); };
var contentEl=$('content'), readerEl=$('reader'), coverEl=$('coverImg');
var rateEl=$('rate'), voiceEl=$('voice'), autoEl=$('autoAdv');

/* ---------- text helpers ---------- */
function splitSentences(t){
  t = (t||'').trim();
  if(!t) return [];
  var parts = t.split(/(?<=[.!?…])\s+(?=[“‘"'(A-Z])/);
  return parts.map(function(s){return s.trim();}).filter(function(s){return s.length;});
}
function mins(w){ return Math.max(1, Math.round(w/150)); }
function hasSel(){ var s=window.getSelection && window.getSelection(); return !!(s && String(s).length>0); }
function chapHead(part){
  var m = (part||'').split(' — ');
  if(m.length>=2){ return {eyebrow:m[0].replace(/^Part\b/i,'Chapter'), title:m.slice(1).join(' — ')}; }
  return {eyebrow:'', title:part};
}

/* ---------- table of contents (chapters + sections) ---------- */
function buildTOC(){
  var aside=$('toc'); var keep=aside.scrollTop; aside.innerHTML='';
  var t=document.createElement('div'); t.className='toctitle'; t.textContent='Contents'; aside.appendChild(t);
  CH.forEach(function(c, ci){
    var head=chapHead(c.part);
    var row=document.createElement('div'); row.className='tocrow'; row.dataset.ci=ci;
    if(ci===curCh) row.classList.add('active');
    var tt=document.createElement('div'); tt.className='tt';
    if(head.eyebrow){ var ce=document.createElement('span'); ce.className='ch'; ce.textContent=head.eyebrow; tt.appendChild(ce); }
    tt.appendChild(document.createTextNode(head.title));
    row.appendChild(tt);
    row.addEventListener('click', function(){ stop(); openChapter(ci); });
    aside.appendChild(row);
    c.sections.forEach(function(s){
      if(!s.title) return;
      var sub=document.createElement('div'); sub.className='subrow'; sub.dataset.sid=s.id;
      sub.textContent=s.title;
      sub.addEventListener('click', function(e){ e.stopPropagation(); stop(); openChapter(ci, false, s.id); });
      aside.appendChild(sub);
    });
  });
  var foot=document.createElement('div'); foot.className='tocfoot';
  foot.innerHTML='<b>One Fast Can Change Your Life</b><br>The eleventh-day fast, freely given. Read it, hear it, and keep a day for God.';
  aside.appendChild(foot);
  aside.scrollTop=keep;
}
function markActive(){
  document.querySelectorAll('.tocrow').forEach(function(r){ r.classList.toggle('active', +r.dataset.ci===curCh); });
}

/* ---------- render one content block, pushing sentences to SENT ---------- */
function renderBlock(b){
  var el;
  if(b.t==='h3'){ el=document.createElement('h3'); }
  else if(b.t==='choice'){
    var row=document.createElement('div'); row.className='choice';
    var key='ofr_pick_'+b.text.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40);
    var cbx=document.createElement('input'); cbx.type='checkbox'; cbx.checked=localStorage.getItem(key)==='1';
    cbx.addEventListener('change', function(){ localStorage.setItem(key, cbx.checked?'1':'0'); });
    row.appendChild(cbx);
    var lab=document.createElement('span'); lab.className='choicelab';
    splitSentences(b.text).forEach(function(sen){
      var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
      var rec={el:sp, text:sen};
      sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
      lab.appendChild(sp); SENT.push(rec);
    });
    row.appendChild(lab);
    contentEl.appendChild(row); return;
  }
  else if(b.t==='li'){ el=document.createElement('div'); el.className='li'; }
  else if(b.t==='clues'){ el=document.createElement('div'); el.className='clues'; }
  else if(b.t==='write'){ el=document.createElement('div'); el.className='write'; el.textContent=b.text; contentEl.appendChild(el); return; }
  else if(b.t==='writebox'){
    var box=document.createElement('div'); box.className='writebox';
    var lab2=document.createElement('p'); lab2.className='wblabel';
    splitSentences(b.label).forEach(function(sen){
      var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
      var rec={el:sp, text:sen};
      sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
      lab2.appendChild(sp); SENT.push(rec);
    });
    box.appendChild(lab2);
    var pad=document.createElement('div'); pad.className='pad'; box.appendChild(pad);
    contentEl.appendChild(box); return;
  }
  else if(b.t==='verse'){
    el=document.createElement('blockquote'); el.className='sloka';
    b.lines.forEach(function(ln){ var sp=document.createElement('span'); sp.className='vl'; sp.textContent=ln; el.appendChild(sp); });
    if(b.cite){ var c=document.createElement('cite'); c.textContent=b.cite; el.appendChild(c); }
    contentEl.appendChild(el); return;
  }
  else if(b.t==='scripture'){
    el=document.createElement('blockquote'); el.className='scripture';
    splitSentences(b.text).forEach(function(sen){
      var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
      var rec={el:sp, text:sen};
      sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
      el.appendChild(sp); SENT.push(rec);
    });
    if(b.cite){ var c2=document.createElement('cite'); c2.textContent='— '+b.cite; el.appendChild(c2); }
    contentEl.appendChild(el); return;
  }
  else if(b.t==='bridge'){ el=document.createElement('p'); el.className='bridge'; }
  else { el=document.createElement('p'); }
  splitSentences(b.text).forEach(function(sen){
    var sp=document.createElement('span'); sp.className='snt'; sp.textContent=sen+' ';
    var rec={el:sp, text:sen};
    sp.addEventListener('click', function(){ if(hasSel())return; playFrom(SENT.indexOf(rec)); });
    el.appendChild(sp); SENT.push(rec);
  });
  contentEl.appendChild(el);
}

/* ---------- render a whole chapter (all its sections, flowing) ---------- */
function openChapter(ci, keepScroll, scrollToSid){
  curCh=ci; idx=0; var c=CH[ci]; var head=chapHead(c.part);
  coverEl.style.display = (ci===0 ? 'block' : 'none');
  $('secPart').textContent = head.eyebrow || '';
  $('secTitle').textContent = head.title;
  $('secMeta').textContent = c.sections.length+' sections · '+c.words+' words · about '+mins(c.words)+' min to hear';
  contentEl.innerHTML=''; SENT=[];
  c.sections.forEach(function(s){
    if(s.title){ var h=document.createElement('h2'); h.className='subsec'; h.id='sub-'+s.id; h.textContent=s.title; contentEl.appendChild(h); }
    s.blocks.forEach(renderBlock);
  });
  $('endNote').innerHTML = (ci===CH.length-1)
    ? 'Thank you for reading. <em>One fast can change your life.</em>'
    : '';
  localStorage.setItem('ofr_lastch', c.id);
  $('prevSec').disabled = (ci===0);
  $('nextSec').disabled = (ci===CH.length-1);
  markActive();
  document.querySelectorAll('.subrow').forEach(function(r){ r.classList.toggle('active', scrollToSid && r.dataset.sid===scrollToSid); });
  if(scrollToSid){
    readerEl.scrollTop=0;
    var go=function(){ var t=document.getElementById('sub-'+scrollToSid); if(t) t.scrollIntoView({block:'start'}); };
    go(); if(window.requestAnimationFrame) requestAnimationFrame(go);
  } else if(keepScroll){
    var sv=parseInt(localStorage.getItem('ofr_scroll_'+c.id)||'0',10);
    var doScroll=function(){ readerEl.scrollTop = sv>0 ? sv : 0; };
    doScroll(); if(window.requestAnimationFrame) requestAnimationFrame(doScroll);
  } else {
    readerEl.scrollTop=0;
  }
}

/* ---------- speech ---------- */
function clearHL(){ SENT.forEach(function(r){ r.el.classList.remove('on'); }); }
function setIcon(){ $('btnPlay').innerHTML = (speaking && !paused) ? '&#10073;&#10073; Pause' : '&#9654; Play'; }

function speakIdx(i){
  if(i>=SENT.length){
    if(autoEl.checked && curCh < CH.length-1){ openChapter(curCh+1); speakIdx(0); return; }
    speaking=false; paused=false; clearHL(); setIcon(); return;
  }
  idx=i; clearHL();
  var r=SENT[i]; r.el.classList.add('on');
  r.el.scrollIntoView({block:'center', behavior:'smooth'});
  var myGen=gen;
  var u=new SpeechSynthesisUtterance(r.text);
  u.rate=parseFloat(rateEl.value)||0.95;
  if(curVoice) u.voice=curVoice;
  u.onend=function(){ if(myGen===gen && speaking && !paused) speakIdx(idx+1); };
  u.onerror=function(){ if(myGen===gen && speaking && !paused) speakIdx(idx+1); };
  speaking=true; paused=false; setIcon();
  synth.speak(u);
}
function playFrom(i){ if(!('speechSynthesis' in window))return; gen++; synth.cancel(); clearHL(); paused=false; speaking=true; speakIdx(i<0?0:i); }
function togglePlay(){
  if(!('speechSynthesis' in window))return;
  if(speaking && !paused){ synth.pause(); paused=true; setIcon(); }
  else if(speaking && paused){ synth.resume(); paused=false; setIcon(); }
  else { playFrom(idx||0); }
}
function stop(){ gen++; speaking=false; paused=false; synth.cancel(); clearHL(); setIcon(); }

/* ---------- voices ---------- */
function loadVoices(){
  var all=synth.getVoices();
  voices = all.filter(function(v){ return /^en/i.test(v.lang); });
  if(!voices.length) voices=all;
  voiceEl.innerHTML='';
  voices.forEach(function(v){ var o=document.createElement('option'); o.value=v.name; o.textContent=v.name.replace(/Microsoft |Google /,'')+' ('+v.lang+')'; voiceEl.appendChild(o); });
  var saved=localStorage.getItem('ofr_voice');
  var pick = voices.filter(function(v){return v.name===saved;})[0]
        || voices.filter(function(v){return /en-IN/i.test(v.lang);})[0]
        || voices.filter(function(v){return /en-GB/i.test(v.lang);})[0]
        || voices[0];
  if(pick){ curVoice=pick; voiceEl.value=pick.name; }
}

/* ---------- wires ---------- */
$('btnPlay').onclick=togglePlay;
$('btnStop').onclick=stop;
$('btnNextS').onclick=function(){ playFrom(Math.min(idx+1, SENT.length-1)); };
$('btnPrevS').onclick=function(){ playFrom(Math.max(idx-1, 0)); };
$('prevSec').onclick=function(){ if(curCh>0){ stop(); openChapter(curCh-1); } };
$('nextSec').onclick=function(){ if(curCh<CH.length-1){ stop(); openChapter(curCh+1); } };
rateEl.oninput=function(){ localStorage.setItem('ofr_rate', rateEl.value); };
voiceEl.onchange=function(){ curVoice=voices.filter(function(v){return v.name===voiceEl.value;})[0]; localStorage.setItem('ofr_voice', voiceEl.value); };
autoEl.onchange=function(){ localStorage.setItem('ofr_auto', autoEl.checked?'1':'0'); };
var tocEl=$('toc');
if($('btnToc')) $('btnToc').onclick=function(){ var op=tocEl.classList.toggle('open'); if(op && window.innerWidth<=760) window.scrollTo(0,0); };
tocEl.addEventListener('click', function(e){ if(window.innerWidth<=760 && (e.target.closest('.tocrow')||e.target.closest('.subrow'))){ tocEl.classList.remove('open'); window.scrollTo(0,0); } });

document.addEventListener('keydown', function(e){
  var tag=e.target.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT'||tag==='SELECT') return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  else if(e.code==='ArrowRight'){ e.preventDefault(); playFrom(Math.min(idx+1, SENT.length-1)); }
  else if(e.code==='ArrowLeft'){ e.preventDefault(); playFrom(Math.max(idx-1, 0)); }
});

/* ---------- remember scroll position (per chapter) ---------- */
var scrollT;
readerEl.addEventListener('scroll', function(){
  clearTimeout(scrollT);
  scrollT=setTimeout(function(){
    if(CH[curCh]) localStorage.setItem('ofr_scroll_'+CH[curCh].id, readerEl.scrollTop);
  }, 200);
});
window.addEventListener('beforeunload', function(){
  if(CH[curCh]) localStorage.setItem('ofr_scroll_'+CH[curCh].id, readerEl.scrollTop);
});

/* ---------- init ---------- */
if(synth){ synth.onvoiceschanged=loadVoices; loadVoices(); }
if(localStorage.getItem('ofr_rate')) rateEl.value=localStorage.getItem('ofr_rate');
if(localStorage.getItem('ofr_auto')!==null) autoEl.checked = localStorage.getItem('ofr_auto')==='1';
buildTOC();
var lastId=localStorage.getItem('ofr_lastch'); var startAt=0;
for(var k=0;k<CH.length;k++){ if(CH[k].id===lastId){ startAt=k; break; } }
openChapter(startAt, true);
</script>
<script>setInterval(function(){try{if(speaking&&!paused&&synth&&!synth.paused){synth.resume();}}catch(e){}},8000);</script>
